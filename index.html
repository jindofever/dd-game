<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dd-game</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Helvetica, Arial, sans-serif;
        background: #f5f1e8;
        color: #1f2937;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #fff7d6 0%, transparent 40%),
          linear-gradient(180deg, #f8f3e7 0%, #ece3cf 100%);
      }

      main {
        padding: 3rem;
        border: 2px solid #1f2937;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow: 12px 12px 0 #d4b483;
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, world.</h1>
      <p>dd-game is live.</p>
    </main>
  </body>
</html>
